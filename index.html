<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYAP 3D: Ay Üssü ve Roket Simülasyonu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: monospace; }
        
        /* MODERN VE KÜÇÜK SİNEMATİK HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(2, 6, 23, 0.85);
            border: 1px solid #00f3ff;
            padding: 15px;
            border-radius: 8px;
            color: #fff;
            width: 320px;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
        .hud-title { color: #ff0055; font-weight: bold; margin-bottom: 5px; font-size: 14px; text-transform: uppercase; }
        .hud-text { color: #cbd5e1; font-size: 12px; line-height: 1.4; }

        /* MERKEZİ HEDEF GÖSTERGESİ (FPS OYUNLARI GİBİ) */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(0, 253, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99;
        }

        /* ALT BİLGİLENDİRME */
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #00f3ff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid #1e293b;
            text-align: center;
            z-index: 100;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="crosshair"></div>

    <div id="hud">
        <div class="hud-title" id="hud-stage">GÖREV 1: ÜSSE ULAŞ</div>
        <div class="hud-text" id="hud-desc">Ay yüzeyindesin. Karşıdaki fütüristik parlayan astronota (Görev Şefi) doğru YÜRÜ ve bilgi al!</div>
    </div>

    <div id="controls-hint">
        [W, A, S, D] ile Yürü | Fareyi Ekrana Tıklayıp Sürükleyerek Etrafa Bak | [E] Rokete Bin / Fırlat
    </div>

    <script>
        // --- 1. SAHNE VE GERÇEKÇİ ATMOSFER ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020208, 0.015); // Derin uzay pusu

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Gerçekçi Işıklar
        const ambientLight = new THREE.AmbientLight(0x111122, 0.6);
        scene.add(ambientLight);
        
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
        sunLight.position.set(30, 50, 10);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // --- 2. GERÇEKÇİ AY YÜZEYİ (DOKULU TOPRAK) ---
        const floorGeom = new THREE.PlaneGeometry(200, 200, 64, 64);
        // Ay yüzeyine kraterli/engebeli hava katmak için tepe klasörleri oluşturma
        const posAttr = floorGeom.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            const vx = posAttr.getX(i);
            const vy = posAttr.getY(i);
            posAttr.setZ(i, Math.sin(vx * 0.1) * Math.cos(vy * 0.1) * 0.4); // Hafif engebeler
        }
        floorGeom.computeVertexNormals();

        const floorMat = new THREE.MeshStandardMaterial({ color: 0x475569, roughness: 0.9, metalness: 0.1 });
        const floor = new THREE.Mesh(floorGeom, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Gökyüzü / Yıldızlar
        const starsGeom = new THREE.BufferGeometry();
        const starPositions = new Float32Array(2000 * 3);
        for(let i=0; i<2000*3; i++) starPositions[i] = (Math.random() - 0.5) * 400;
        starsGeom.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starField = new THREE.Points(starsGeom, new THREE.PointsMaterial({color: 0xffffff, size: 0.3}));
        scene.add(starField);

        // --- 3. GERÇEKÇİ MODELLER: GÖREV ŞEFİ & AY ÜSSÜ & ROKET ---
        
        // 1. GÖREV ŞEFİ (Karakter)
        const chefGroup = new THREE.Group();
        const chefBody = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), new THREE.MeshStandardMaterial({color: 0xffffff}));
        chefBody.position.y = 1.5;
        const chefVisor = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 0.4), new THREE.MeshBasicMaterial({color: 0x00f3ff}));
        chefVisor.position.set(0, 1.6, 0.4);
        chefGroup.add(chefBody, chefVisor);
        chefGroup.position.set(0, 0, -10); // Karşıda bekliyor
        scene.add(chefGroup);

        // 2. AY ÜSSÜ (Fütüristik Kubbe/Dome)
        const dome = new THREE.Mesh(new THREE.SphereGeometry(6, 32, 16, 0, Math.PI*2, 0, Math.PI/2), new THREE.MeshStandardMaterial({color: 0x334155, transparent: true, opacity: 0.7, roughness: 0.2}));
        dome.position.set(-15, 0, -15);
        scene.add(dome);

        // 3. ROKET (AYAP Fırlatma Sistemi)
        const rocket = new THREE.Group();
        const rBody = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 5, 16), new THREE.MeshStandardMaterial({color: 0xdddddd, metalness: 0.8}));
        rBody.position.y = 2.5;
        const rCone = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.2, 16), new THREE.MeshStandardMaterial({color: 0xff0055}));
        rCone.position.y = 5.6;
        rocket.add(rBody, rCone);
        rocket.position.set(15, 0, -15); // Sağ taraftaki fırlatma rampasında
        scene.add(rocket);

        // Roket Ateş Efekti
        const fire = new THREE.Mesh(new THREE.ConeGeometry(0.5, 2, 16), new THREE.MeshBasicMaterial({color: 0xff5500}));
        fire.position.y = -1;
        fire.rotation.x = Math.PI;
        fire.visible = false;
        rocket.add(fire);

        // --- 4. RPG OYUNCU HAREKET MANTIĞI & FARE BAKIŞI ---
        let player = { x: 0, z: 10, rotY: 0, rotX: 0, inRocket: false };
        camera.position.set(player.x, 1.8, player.z); // Göz hizası

        const keys = {};
        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; checkInteraction(e.key); });
        window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

        // Gelişmiş Fare Bakış Kontrolü (Mouse Look)
        let isMouseDown = false;
        window.addEventListener('mousedown', () => isMouseDown = true);
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', (e) => {
            if (!isMouseDown || player.inRocket) return;
            player.rotY -= e.movementX * 0.003;
            player.rotX -= e.movementY * 0.003;
            player.rotX = Math.max(-Math.PI/3, Math.min(Math.PI/3, player.rotX)); // Kafayı çok yukarı/aşağı eğmesin
        });

        // --- 5. ETKİLEŞİMLİ GÖREV SİSTEMİ ---
        let currentStage = 1;

        function checkInteraction(key) {
            if (key.toLowerCase() === 'e') {
                // Şefin yanındayken konuşma tetiklensin
                const distToChef = camera.position.distanceTo(chefGroup.position);
                if (distToChef < 3 && currentStage === 1) {
                    currentStage = 2;
                    document.getElementById('hud-stage').innerText = "GÖREV 2: ROKETE BİN";
                    document.getElementById('hud-desc').innerText = "Şef: 'Komutan, AYAP-2 yumuşak iniş modülleri tamamlandı! Sağdaki milli rokete doğru ilerle ve binmek için [E]'ye bas!'";
                    return;
                }

                // Roketin yanındayken binme tetiklensin
                const distToRocket = camera.position.distanceTo(rocket.position);
                if (distToRocket < 4 && currentStage === 2) {
                    player.inRocket = true;
                    currentStage = 3;
                    document.getElementById('hud-stage').innerText = "GÖREV 3: UZAYA FIRLAT";
                    document.getElementById('hud-desc').innerText = "Sistem: Roket kokpitine girildi. Hibrit motor hazır! Tekrar [E] tuşuna basarak motorları ateşle ve Ay yörüngesine fırlat!";
                    return;
                }

                // Roketi fırlatma tetiklenmesi
                if (player.inRocket && currentStage === 3) {
                    currentStage = 4;
                    fire.visible = true;
                    document.getElementById('hud-stage').innerText = "GÖREV TAMAMLANDI! 🚀";
                    document.getElementById('hud-desc').innerText = "Milli Hibrit motor başarıyla ateşlendi! AYAP Uzay aracı Ay Transfer Yörüngesine giriyor. Türkiye göklerde!";
                }
            }
        }

        // --- 6. ANA DÖNGÜ (OYUN AKIŞI) ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const speed = 4 * delta;

            if (!player.inRocket) {
                // Yürüme yönü hesaplama (Kameranın baktığı yöne doğru yürüme)
                const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), player.rotY);
                const side = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), player.rotY);

                if (keys['w']) { player.x += forward.x * speed; player.z += forward.z * speed; }
                if (keys['s']) { player.x -= forward.x * speed; player.z -= forward.z * speed; }
                if (keys['a']) { player.x -= side.x * speed; player.z -= side.z * speed; }
                if (keys['d']) { player.x += side.x * speed; player.z += side.z * speed; }

                // Kamera Pozisyon Güncelleme
                camera.position.x = player.x;
                camera.position.z = player.z;

                // Kamera Dönüşleri (Kafayı döndürme etkisi)
                camera.rotation.set(0, 0, 0);
                camera.rotation.y = player.rotY;
                camera.rotation.x = player.rotX;
            } else {
                // Eğer roketteysek kamera rokete kilitlensin
                camera.position.set(rocket.position.x, rocket.position.y + 3, rocket.position.z + 12);
                camera.lookAt(rocket.position);

                // Roket fırlatıldıysa yukarı doğru yükselsin
                if (currentStage === 4) {
                    rocket.position.y += 8 * delta;
                    fire.scale.set(1, Math.random() * 0.4 + 0.8, 1);
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
