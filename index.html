<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYAP Uzay Görevi Simülasyonu</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #050510;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 500px;
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
            border: 2px solid #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
            border-radius: 8px;
            overflow: hidden;
        }
        /* Yıldızlar */
        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
        }
        /* Şef / Bilgi Paneli */
        #ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(2, 6, 23, 0.85);
            border: 1px solid #00ffcc;
            padding: 15px;
            border-radius: 5px;
            z-index: 10;
        }
        #chef-title {
            font-weight: bold;
            color: #ff0055;
            margin-bottom: 5px;
        }
        /* Ay */
        #moon {
            position: absolute;
            right: -50px;
            top: 150px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle at 30% 30%, #94a3b8, #475569);
            border-radius: 50%;
            box-shadow: inset -20px -20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(148, 163, 184, 0.4);
        }
        /* Uzay Aracı */
        #spacecraft {
            position: absolute;
            left: 50px;
            top: 220px;
            width: 60px;
            height: 40px;
            background: #cbd5e1;
            border: 2px solid #334155;
            border-radius: 5px;
            transition: transform 0.1s;
        }
        /* Güneş Panelleri */
        #spacecraft::before, #spacecraft::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 12px;
            background: repeating-linear-gradient(90deg, #1e3a8a, #1e40af 5px, #3b82f6 5px, #3b82f6 10px);
            border: 1px solid #00ffcc;
            left: 10px;
        }
        #spacecraft::before { top: -14px; }
        #spacecraft::after { bottom: -14px; }

        /* Motor Ateşi */
        .thruster {
            position: absolute;
            left: -15px;
            top: 12px;
            width: 15px;
            height: 12px;
            background: linear-gradient(to left, #ff7700, #ff0000);
            clip-path: polygon(100% 0, 0 50%, 100% 100%);
            display: none;
        }
        /* Kontroller */
        #controls-hint {
            margin-top: 15px;
            color: #8892b0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Bilgi Ekranı -->
        <div id="ui-panel">
            <div id="chef-title">🛰️ GÖREV ŞEFİ PANELİ:</div>
            <div id="dialog">Sistem yükleniyor...</div>
        </div>

        <!-- Gök Cisimleri ve Karakterler -->
        <div id="moon"></div>
        <div id="spacecraft">
            <div class="thruster" id="thruster"></div>
        </div>
    </div>

    <div id="controls-hint">Yön Tuşları (Ok Tuşları) ile uzay aracını hareket ettirerek Ay yörüngesine ulaşın!</div>

    <script>
        const dialogs = [
            "Merhaba Kaptan! Ben Görev Şefi. Bugün AYAP-1 görevini başlatıyoruz!",
            "AYAP-1 uydumuz, DeltaV üretimi milli HİBRİT motor kullanıyor. Çok güçlüdür!",
            "Gördüğün gibi iki yanında mavi Güneş Panelleri var, uzayda asla enerjisiz kalmaz.",
            "Şimdi ok tuşlarını kullan, motoru ateşle ve uydumuzu sağdaki AY'a ulaştır!"
        ];

        let currentDialogIndex = 0;
        const dialogElement = document.getElementById('dialog');
        const spacecraft = document.getElementById('spacecraft');
        const thruster = document.getElementById('thruster');
        
        // Diyalog Sistemi
        function showNextDialog() {
            if (currentDialogIndex < dialogs.length) {
                dialogElement.innerText = dialogs[currentDialogIndex];
                currentDialogIndex++;
                setTimeout(showNextDialog, 4000); // Her 4 saniyede bir yeni bilgi
            }
        }
        setTimeout(showNextDialog, 1000);

        // Arka plana rastgele yıldızlar ekleme
        const container = document.getElementById('game-container');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 800 + 'px';
            star.style.top = Math.random() * 500 + 'px';
            star.style.opacity = Math.random();
            container.appendChild(star);
        }

        // Oyun Döngüsü ve Hareket Kontrolleri
        let posX = 50;
        let posY = 220;
        const speed = 8;
        let gameOver = false;

        const keys = {};
        window.addEventListener('keydown', e => {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
                e.preventDefault(); // Sayfanın kaymasını engelle
            }
            keys[e.key] = true;
            if(e.key === "ArrowRight") thruster.style.display = 'block';
        });
        window.addEventListener('keyup', e => {
            keys[e.key] = false;
            if(e.key === "ArrowRight") thruster.style.display = 'none';
        });

        function gameLoop() {
            if (gameOver) return;

            if (keys['ArrowUp'] && posY > 80) posY -= speed;
            if (keys['ArrowDown'] && posY < 440) posY += speed;
            if (keys['ArrowLeft'] && posX > 10) posX -= speed;
            if (keys['ArrowRight'] && posX < 730) posX += speed;

            spacecraft.style.left = posX + 'px';
            spacecraft.style.top = posY + 'px';

            // Ay'a ulaştı mı kontrolü (Çarpma / Sert İniş Testi)
            if (posX >= 600 && posY >= 110 && posY <= 350) {
                gameOver = true;
                document.getElementById('chef-title').innerText = "🎉 GÖREV BAŞARILI!";
                dialogElement.innerHTML = "<strong>Tebrikler Kaptan!</strong> AYAP-1 Ay yörüngesine girip sert iniş yaptı ve bilimsel verileri topladı! <br>Sırada AYAP-2 var: Yumuşak iniş ve Rover (Gezgin) robotu ile Ay toprağı analizi!";
                spacecraft.style.display = 'none';
            }

            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
