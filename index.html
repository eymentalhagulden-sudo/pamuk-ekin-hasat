<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D AYAP-1 Uzay Görevi Simülasyonu</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }
        /* Arayüz Paneli */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(2, 6, 23, 0.85);
            border: 2px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            padding: 15px;
            border-radius: 8px;
            color: #00ffcc;
            pointer-events: none;
            z-index: 10;
        }
        #chef-title {
            font-weight: bold;
            color: #ff0055;
            font-size: 18px;
            margin-bottom: 5px;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #8892b0;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            border: 1px solid #334155;
        }
    </style>
    <!-- 3D Grafikler için Three.js Kütüphanesini Dahil Ediyoruz -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-panel">
        <div id="chef-title">🛰️ GÖREV ŞEFİ PANELİ (3D SİMÜLASYON):</div>
        <div id="dialog">AYAP-1 3D Motorları ve Sistemleri Başlatılıyor...</div>
    </div>

    <div id="controls-hint">
        KONTROLLER: Yön Tuşları (Ok Tuşları) = Yukarı/Aşağı/Sağ/Sol | "W" = İleri | "S" = Geri
    </div>

    <script>
        // --- 1. 3D SAHNE VE KAMERA AYARLARI ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. IŞIKLANDIRMA ---
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        // --- 3. UZAY ARKA PLANI (YILDIZLAR) ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 2000;
        const starPositions = new Float32Array(starsCount * 3);
        for(let i = 0; i < starsCount * 3; i++) {
            starPositions[i] = (Math.random() - 0.5) * 500;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);

        // --- 4. 3D AY MODELİ ---
        const moonGeometry = new THREE.SphereGeometry(4, 32, 32);
        // Gerçekçi yüzey dokusu efekti için procedurial materyal
        const moonMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x888888, 
            roughness: 0.9,
            metalness: 0.1
        });
        const moon = new THREE.Mesh(moonGeometry, moonMaterial);
        moon.position.set(25, 0, -10); // Ay'ı sağa ve biraz geriye yerleştiriyoruz
        scene.add(moon);

        // --- 5. 3D AYAP-1 UZAY ARACI (GÜNEŞ PANELLİ) ---
        const spacecraftGroup = new THREE.Group();

        // Ana Gövde (Küp)
        const bodyGeom = new THREE.BoxGeometry(1.5, 1, 1);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 });
        const bodyMesh = new THREE.Mesh(bodyGeom, bodyMat);
        spacecraftGroup.add(bodyMesh);

        // İki Yandaki Güneş Panelleri (Mavi İnce Kutular)
        const panelGeom = new THREE.BoxGeometry(0.2, 0.8, 2.5);
        const panelMat = new THREE.MeshStandardMaterial({ color: 0x0033cc, metalness: 0.5 });
        
        const leftPanel = new THREE.Mesh(panelGeom, panelMat);
        leftPanel.position.set(0, 0, 1.5);
        spacecraftGroup.add(leftPanel);

        const rightPanel = new THREE.Mesh(panelGeom, panelMat);
        rightPanel.position.set(0, 0, -1.5);
        spacecraftGroup.add(rightPanel);

        // Hibrit Motor Çıkışı (Arka Kısım)
        const engineGeom = new THREE.ConeGeometry(0.3, 0.5, 16);
        const engineMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const engineMesh = new THREE.Mesh(engineGeom, engineMat);
        engineMesh.rotation.z = Math.PI / 2;
        engineMesh.position.set(-1, 0, 0);
        spacecraftGroup.add(engineMesh);

        scene.add(spacecraftGroup);
        spacecraftGroup.position.set(-15, 0, 0); // Başlangıç pozisyonu (Solda)

        // Kamera uydunun arkasından takip etsin
        camera.position.set(-15, 3, 10);
        camera.lookAt(spacecraftGroup.position);

        // --- 6. HAREKET VE TUŞ KONTROLLERİ ---
        const keys = {};
        window.addEventListener('keydown', e => { keys[e.key] = true; });
        window.addEventListener('keyup', e => { keys[e.key] = false; });

        const speed = 0.2;
        let gameOver = false;

        // Diyalog Yönetimi
        const dialogs = [
            "Merhaba Kaptan! 3D AYAP-1 Simülasyonuna Hoş Geldiniz!",
            "Uydumuz DeltaV imzalı yerli HİBRİT motoruyla uzayda süzülüyor.",
            "İki yandaki mavi güneş panelleri 3D uzay ekseninde sürekli enerji üretiyor.",
            "Şimdi yön tuşları ve W-S tuşları ile uydumuzu sağdaki büyük AY'a ulaştırın!"
        ];
        let dialogIdx = 0;
        function updateDialog() {
            if (dialogIdx < dialogs.length && !gameOver) {
                document.getElementById('dialog').innerText = dialogs[dialogIdx];
                dialogIdx++;
                setTimeout(updateDialog, 5000);
            }
        }
        setTimeout(updateDialog, 1000);

        // --- 7. ANA OYUN DÖNGÜSÜ (ANIMASYON) ---
        function animate() {
            requestAnimationFrame(animate);

            // Ay kendi ekseninde dönsün
            moon.rotation.y += 0.002;

            if (!gameOver) {
                // Tuş kontrollerine göre 3 boyutlu hareket
                if (keys['ArrowUp']) spacecraftGroup.position.y += speed;
                if (keys['ArrowDown']) spacecraftGroup.position.y -= speed;
                if (keys['ArrowLeft']) spacecraftGroup.position.z -= speed;
                if (keys['ArrowRight']) spacecraftGroup.position.z += speed;
                if (keys['w'] || keys['W']) spacecraftGroup.position.x += speed;
                if (keys['s'] || keys['S']) spacecraftGroup.position.x -= speed;

                // Kamerayı yumuşak bir şekilde uydunun arkasında tut
                camera.position.x = spacecraftGroup.position.x - 8;
                camera.position.y = spacecraftGroup.position.y + 3;
                camera.position.z = spacecraftGroup.position.z + 7;
                camera.lookAt(spacecraftGroup.position);

                // Ay ile Çarpışma Testi (Mesafe Ölçümü)
                const distance = spacecraftGroup.position.distanceTo(moon.position);
                if (distance < 5.5) { // Ay'ın yarıçapına yaklaştığında çarpışma olur
                    gameOver = true;
                    document.getElementById('chef-title').innerText = "🎉 3D GÖREV BAŞARIYLA TAMAMLANDI!";
                    document.getElementById('dialog').innerHTML = "<strong>Harika İniş Kaptan!</strong> AYAP-1 3D uzay ortamında Ay yörüngesine girerek sert temas sağladı ve tüm bilimsel verileri merkeze iletti. <br>Bir sonraki aşama AYAP-2: Yumuşak İniş ve Gezgin Robot (Rover) görevi!";
                }
            }

            renderer.render(scene, camera);
        }

        // Ekran boyutu değiştiğinde 3D sahneyi esnetme
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
